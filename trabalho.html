<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trabalho — [Seu Nome]</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Afacad:wght@400;500;600;700&family=Fraunces:ital,wght@0,400;0,500;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main" id="main-content">
      <!-- preenchido via JS -->
    </main>
  </div>

  <script src="data.js"></script>
  <script src="components.js"></script>
  <script>
    window.ACTIVE_NAV = "trabalhos";

    function getSlug() {
      const params = new URLSearchParams(window.location.search);
      return params.get("slug") || (PROJECTS[0] && PROJECTS[0].slug);
    }

    function imageWithCaption(src, caption) {
      return `
        <div class="phase-image-with-caption">
          <img src="${src}" alt="${caption || ""}" loading="lazy">
          ${caption ? `<p class="image-caption">${caption}</p>` : ""}
        </div>
      `;
    }

    function phaseVideo(src) {
      return `
        <div class="phase-video">
          <video src="${src}" autoplay loop muted playsinline></video>
        </div>
      `;
    }

    function posterCarousel(project) {
      if (!project || !project.gallery || !project.gallery.length) return "";
      // itens duplicados para permitir o loop infinito sem emenda
      const items = project.gallery.map((src, i) => `
        <div class="poster-item"><img src="${src}" alt="${project.title} — cartaz ${ (i % project.gallery.length) + 1 }" loading="lazy"></div>
      `).join("");
      return `<div class="poster-carousel">
        <div class="poster-track">
          ${items}
          ${items}
        </div>
      </div>`;
    }

    function valueCards(cards) {
      if (!Array.isArray(cards) || !cards.length) return "";
      return `<div class="value-cards">
        ${cards.map(c => `
          <div class="value-card" style="--card-color:${c.color}">
            <p class="value-card-title">${c.title}</p>
            <p class="value-card-text">${c.text}</p>
          </div>
        `).join("")}
      </div>`;
    }

    function colorPalette(palette) {
      if (!Array.isArray(palette) || !palette.length) return "";
      return `<div class="palette-grid">
        ${palette.map(c => `
          <button type="button" class="swatch" style="--swatch:${c.hex}" data-hex="${c.hex}" title="Clique para copiar ${c.hex}">
            <span class="swatch-fill"></span>
            <span class="swatch-info">
              <span class="swatch-hex">${c.hex}</span>
              <span class="swatch-rgb">${c.rgb}</span>
              <span class="swatch-cmyk">${c.cmyk}</span>
            </span>
          </button>
        `).join("")}
      </div>`;
    }

    function typeSpecimens(specimens) {
      if (!Array.isArray(specimens) || !specimens.length) return "";
      return `<div class="specimens">
        ${specimens.map(s => `
          <div class="specimen">
            <span class="specimen-sample" style="font-family:${s.font}">${s.sample}</span>
            <span class="specimen-name">${s.name}</span>
          </div>
        `).join("")}
      </div>`;
    }

    function mockupGallery(mockups) {
      if (!Array.isArray(mockups) || !mockups.length) return "";
      const items = mockups.map(m => `
        <div class="mk-item">
          ${m.spin ? `<span class="mk-spin"><img src="assets/marca-notion.png" alt="" aria-hidden="true"></span>` : ""}
          <img class="mk-obj" src="${m.image}" alt="${m.caption || ""}" loading="lazy">
        </div>
      `).join("");
      return `<div class="mockup-strip">
        <span class="mk-band" aria-hidden="true"></span>
        <div class="mk-row">${items}</div>
      </div>`;
    }

    function phaseImages(phase, project) {
      const hasCustom = (Array.isArray(phase.cards) && phase.cards.length)
        || (Array.isArray(phase.palette) && phase.palette.length)
        || (Array.isArray(phase.specimens) && phase.specimens.length)
        || (Array.isArray(phase.mockups) && phase.mockups.length);

      if (phase.image || (Array.isArray(phase.extraImages) && phase.extraImages.length)) {
        let html = "";
        if (phase.image) html += imageWithCaption(phase.image, phase.imageCaption);
        if (Array.isArray(phase.extraImages)) {
          html += phase.extraImages.map(item => imageWithCaption(item.image, item.caption)).join("");
        }
        return html;
      }

      if (phase.id === "contexto" && project && project.gallery && project.gallery.length) {
        return posterCarousel(project);
      }

      if (hasCustom) return "";

      if (phase.layout === "triple") {
        return `<div class="image-row">
          <div class="phase-image"></div>
          <div class="phase-image"></div>
          <div class="phase-image"></div>
        </div>`;
      }
      return `<div class="phase-image"></div>`;
    }

    function renderPhaseBody(ph, project) {
      if (ph.layout === "book") {
        return `
          <div class="phase-book">
            <div class="phase-book-cover">
              <img src="${ph.bookCover}" alt="Capa do livro Aurélia: A Dicionária da Língua Afiada">
            </div>
            <div class="phase-book-text">
              <p>${ph.text}</p>
            </div>
          </div>
        `;
      }
      return `
        ${ph.text ? `<p>${ph.text}</p>` : ""}
        ${valueCards(ph.cards)}
        ${colorPalette(ph.palette)}
        ${typeSpecimens(ph.specimens)}
        ${mockupGallery(ph.mockups)}
        ${ph.video ? phaseVideo(ph.video) : ""}
        ${phaseImages(ph, project)}
        ${ph.showGallery ? posterCarousel(project) : ""}
      `;
    }

    function renderProject() {
      const project = PROJECTS.find(p => p.slug === getSlug());
      const main = document.getElementById("main-content");

      if (!project) {
        main.innerHTML = `<p class="meta-line">Projeto não encontrado. <a href="index.html" style="color:var(--teal)">Voltar</a></p>`;
        return;
      }

      const headerInner = `
        <p class="meta-line">${project.client} | ${project.year}</p>
        <h1>${project.title}</h1>
      `;

      const brandColors = ["#57CF00", "#00ADA9", "#7E3FE0", "#F2CB05", "#57CF00", "#7E3FE0"];
      const header = project.interactive ? `
        <div class="mp-hero" id="mp-hero">
          <div class="mp-blobs" id="mp-blobs">
            ${brandColors.map((c, i) => `<span class="mp-blob" data-depth="${(i % 3) + 1}" style="--c:${c}"></span>`).join("")}
          </div>
          <div class="project-header mp-header">${headerInner}</div>
        </div>
      ` : `<div class="project-header">${headerInner}</div>`;

      main.innerHTML = `
        <a class="back-link" href="index.html">&larr; voltar</a>

        ${header}

        <div class="project-body">
          <nav class="phase-nav" id="phase-nav">
            ${project.phases.map((ph, i) => `<a href="#${ph.id}" data-id="${ph.id}" class="${i === 0 ? "active" : ""}">${ph.label}</a>`).join("")}
          </nav>

          <div class="project-sections">
            ${project.phases.map(ph => `
              <section class="phase-section" id="${ph.id}">
                <h2>${ph.heading}</h2>
                ${renderPhaseBody(ph, project)}
              </section>
            `).join("")}
            ${Array.isArray(project.downloads) && project.downloads.length ? `
              <div class="downloads">
                ${project.downloads.map(d => `<a class="download-btn" href="${d.file}" download>${d.label}</a>`).join("")}
              </div>
            ` : ""}
          </div>
        </div>
      `;

      setupScrollSpy(project.phases.map(ph => ph.id));
      if (project.interactive) setupInteractive();
    }

    function setupInteractive() {
      const hero = document.getElementById("mp-hero");
      if (hero) {
        const blobs = Array.from(hero.querySelectorAll(".mp-blob"));
        const seeds = blobs.map((b, i) => ({
          x: (i * 17 + 8) % 90,
          y: (i * 29 + 12) % 70,
          size: 90 + ((i * 47) % 120),
          depth: Number(b.dataset.depth) || 1,
        }));
        blobs.forEach((b, i) => {
          const s = seeds[i];
          b.style.left = s.x + "%";
          b.style.top = s.y + "%";
          b.style.width = s.size + "px";
          b.style.height = s.size + "px";
        });
        hero.addEventListener("pointermove", (e) => {
          const r = hero.getBoundingClientRect();
          const mx = (e.clientX - r.left) / r.width - 0.5;
          const my = (e.clientY - r.top) / r.height - 0.5;
          blobs.forEach((b, i) => {
            const d = seeds[i].depth * 16;
            b.style.transform = `translate(${mx * d}px, ${my * d}px)`;
          });
        });
        hero.addEventListener("pointerleave", () => {
          blobs.forEach(b => { b.style.transform = "translate(0,0)"; });
        });
      }

      document.querySelectorAll(".swatch").forEach(sw => {
        sw.addEventListener("click", () => {
          const hex = sw.dataset.hex || "";
          if (navigator.clipboard) navigator.clipboard.writeText(hex).catch(() => {});
          sw.classList.add("copied");
          setTimeout(() => sw.classList.remove("copied"), 900);
        });
      });
    }

    function setupScrollSpy(ids) {
      const links = document.querySelectorAll(".phase-nav a");
      const sections = ids.map(id => document.getElementById(id)).filter(Boolean);

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            links.forEach(l => l.classList.remove("active"));
            const match = document.querySelector(`.phase-nav a[data-id="${entry.target.id}"]`);
            if (match) match.classList.add("active");
          }
        });
      }, { rootMargin: "-20% 0px -70% 0px", threshold: 0 });

      sections.forEach(s => observer.observe(s));
    }

    document.addEventListener("DOMContentLoaded", renderProject);
  </script>
</body>
</html>
