<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contato — [Seu Nome]</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">
      <p class="eyebrow" style="margin-bottom:26px;">contato</p>

      <div class="contact-list" id="contact-list"></div>

      <p class="contact-note">Prefere falar por e-mail? É só escrever — costumo responder em um ou dois dias.</p>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="components.js"></script>
  <script>
    window.ACTIVE_NAV = "contato";

    document.addEventListener("DOMContentLoaded", () => {
      const rows = [
        { label: "email", value: SITE.email, href: `mailto:${SITE.email}` },
        { label: "linkedin", value: SITE.linkedin, href: `https://${SITE.linkedin}` },
        { label: "insta", value: SITE.instagram, href: `https://instagram.com/${SITE.instagram.replace("@","")}` },
        { label: "cv", value: "baixar currículo", href: SITE.cv },
      ];

      document.getElementById("contact-list").innerHTML = rows.map(r => `
        <a class="contact-row" href="${r.href}" target="_blank" rel="noopener">
          <span class="label">${r.label}</span>
          <span class="value">${r.value}</span>
          <span class="arrow">&rarr;</span>
        </a>
      `).join("");
    });
  </script>
</body>
</html>
