<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[Seu Nome] — Design de produto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">
      <div class="work-grid" id="work-grid"></div>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="components.js"></script>
  <script>
    window.ACTIVE_NAV = "trabalhos";

    function renderWorkGrid() {
      const grid = document.getElementById("work-grid");
      grid.innerHTML = PROJECTS.map(p => `
        <a class="work-card" href="trabalho.html?slug=${p.slug}">
          <div class="work-thumb">
            ${p.cover ? `<img src="${p.cover}" alt="${p.title}">` : ""}
          </div>
          <p class="meta-line">${p.client} | ${p.year}</p>
          <p class="work-title">${p.title}</p>
        </a>
      `).join("");
    }
    document.addEventListener("DOMContentLoaded", renderWorkGrid);
  </script>
</body>
</html>
