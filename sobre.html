<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sobre — [Seu Nome]</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">
      <div class="about-top">
        <div class="about-photo" id="about-photo"></div>
        <div class="about-copy">
          <h1 id="about-name"></h1>
          <p id="about-intro"></p>
        </div>
      </div>

      <div class="about-section">
        <p class="section-label">softwares</p>
        <div class="software-row" id="software-row"></div>
      </div>

      <div class="about-section">
        <p class="section-label">skills</p>
        <div class="skills-grid" id="skills-grid"></div>
      </div>

      <div class="about-section">
        <p class="section-label">experiência</p>
        <div class="timeline" id="experience-list"></div>
      </div>

      <div class="about-section">
        <p class="section-label">formação</p>
        <div class="timeline" id="education-list"></div>
      </div>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="components.js"></script>
  <script>
    window.ACTIVE_NAV = "sobre";

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("about-name").textContent = `${SITE.name}, ${SITE.role}.`;
      document.getElementById("about-intro").innerHTML = ABOUT.intro.split("\n\n").map(p => `<p>${p}</p>`).join("");

      document.getElementById("software-row").innerHTML = ABOUT.softwares.map(s => `
        <div class="software-chip" title="${s.name}"><img src="${s.icon}" alt="${s.name}"></div>
      `).join("");

      document.getElementById("skills-grid").innerHTML = ABOUT.skills.map(s => `
        <div class="skill-pill">${s}</div>
      `).join("");

      document.getElementById("experience-list").innerHTML = ABOUT.experience.map(e => `
        <div class="timeline-item">
          <p class="period">${e.period}</p>
          <div>
            <p class="role">${e.role}</p>
            <p class="org">${e.org}</p>
          </div>
        </div>
      `).join("");

      document.getElementById("education-list").innerHTML = ABOUT.education.map(e => `
        <div class="timeline-item">
          <p class="period">${e.period}</p>
          <div>
            <p class="role">${e.role}</p>
            <p class="org">${e.org}</p>
          </div>
        </div>
      `).join("");
    });
  </script>
</body>
</html>
